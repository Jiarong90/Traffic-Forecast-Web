<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAST Mobile Location</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(480px, 100%);
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(148,163,184,0.24);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 24px 48px rgba(15,23,42,0.14);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 18px; color: #475569; line-height: 1.6; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #1e3a8a; }
    input {
      width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.32); font-size: 14px; background: #fff;
    }
    .actions { display: flex; gap: 12px; margin-top: 16px; }
    button {
      flex: 1; border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700;
      cursor: pointer;
    }
    .start { background: #2563eb; color: #fff; }
    .stop { background: #e2e8f0; color: #0f172a; }
    .status {
      margin-top: 18px; padding: 14px; border-radius: 14px; background: #f8fafc; border: 1px solid #e2e8f0;
      font-size: 13px; line-height: 1.7; white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>FAST Mobile Location Uploader</h1>
    <p>Open this page on your Android phone. It will keep sending your live GPS coordinates to FAST so the Mac map can track your route in real time.</p>
    <div class="field">
      <label for="deviceName">Device Name</label>
      <input id="deviceName" type="text" value="Android Phone" />
    </div>
    <div class="actions">
      <button class="start" id="startBtn" type="button">START SHARING</button>
      <button class="stop" id="stopBtn" type="button">STOP</button>
    </div>
    <div class="status" id="statusBox">Status: idle</div>
  </div>

  <script>
    let watchId = null;
    const statusBox = document.getElementById('statusBox');
    const deviceNameInput = document.getElementById('deviceName');

    function setStatus(text) {
      statusBox.textContent = text;
    }

    async function sendLocation(lat, lon, accuracy) {
      const res = await fetch('/api/mobile-location/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          lat,
          lon,
          accuracy,
          deviceName: deviceNameInput.value || 'Android Phone'
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      return data;
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      if (!navigator.geolocation || !navigator.geolocation.watchPosition) {
        setStatus('Status: geolocation is not supported on this device/browser.');
        return;
      }
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      setStatus('Status: requesting location permission...');
      watchId = navigator.geolocation.watchPosition(async (pos) => {
        try {
          const lat = Number(pos.coords.latitude);
          const lon = Number(pos.coords.longitude);
          const accuracy = Number(pos.coords.accuracy || 0);
          await sendLocation(lat, lon, accuracy);
          setStatus(`Status: sharing live location\nLatitude: ${lat.toFixed(6)}\nLongitude: ${lon.toFixed(6)}\nAccuracy: ${Math.round(accuracy)} m\nUpdated: ${new Date().toLocaleTimeString()}`);
        } catch (err) {
          setStatus(`Status: upload failed\n${err.message}`);
        }
      }, (err) => {
        setStatus(`Status: location failed\n${err.message || 'Unknown error'}`);
      }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 15000
      });
    });

    document.getElementById('stopBtn').addEventListener('click', async () => {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      try {
        await fetch('/api/mobile-location/clear', { method: 'POST' });
      } catch (_) {}
      setStatus('Status: stopped');
    });
  </script>
</body>
</html>
